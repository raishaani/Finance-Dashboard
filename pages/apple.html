<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Apple (AAPL)</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#080a0f;
color:#e8edf5;
font-family:Arial, Helvetica, sans-serif;
}

.card{
background:#111820;
border:1px solid #1e2d3d;
border-radius:12px;
transition:0.3s;
}

.card:hover{
transform:translateY(-4px);
}

.fade-in{
animation:fade 0.6s ease;
}

@keyframes fade{
from{opacity:0; transform:translateY(10px);}
to{opacity:1; transform:translateY(0);}
}

.back-btn{
background:#1e293b;
padding:8px 14px;
border-radius:6px;
font-size:14px;
}

.back-btn:hover{
background:#334155;
}

</style>

</head>

<body class="p-10">

<!-- Back Button -->

<a href="../index.html" class="back-btn">← Back to Overview</a>

<!-- Title -->

<h1 class="text-3xl mt-6 mb-6 fade-in">
Apple Inc. (AAPL)
</h1>

<!-- Chart Card -->

<div class="card p-6 fade-in">

<h2 class="text-xl mb-4">Live Stock Chart</h2>

<canvas id="appleChart"></canvas>

</div>
<div class="card p-6 mt-6 fade-in">

<h2 class="text-xl mb-4">Trade Apple (Simulation)</h2>

<p class="mb-2">Your Shares: <span id="shares">45</span></p>

<input 
id="quantity"
type="number"
placeholder="Enter shares"
class="text-black p-2 rounded mr-2"
/>

<button 
onclick="buyStock()"
class="bg-green-600 px-4 py-2 rounded mr-2"
>
Buy
</button>

<button 
onclick="sellStock()"
class="bg-red-600 px-4 py-2 rounded"
>
Sell
</button>

</div>
<script>

let shares = 45;

function buyStock(){

let qty = parseInt(document.getElementById("quantity").value);

if(!qty || qty <= 0){
alert("Enter valid shares");
return;
}

shares += qty;

document.getElementById("shares").innerText = shares;

}

function sellStock(){

let qty = parseInt(document.getElementById("quantity").value);

if(!qty || qty <= 0){
alert("Enter valid shares");
return;
}

if(qty > shares){
alert("Not enough shares");
return;
}

shares -= qty;

document.getElementById("shares").innerText = shares;

}

</script>
<script>

const apiKey = "d5aec35c6ab040bdb796654bafc710ee";

async function loadChart(){

const response = await fetch(
`https://api.twelvedata.com/time_series?symbol=AAPL&interval=5min&outputsize=30&apikey=${apiKey}`
);

const data = await response.json();

const prices = data.values.map(v => v.close).reverse();
const times = data.values.map(v => v.datetime).reverse();

const ctx = document.getElementById("appleChart");

new Chart(ctx,{
type:'line',

data:{
labels:times,

datasets:[{
label:'AAPL Price',
data:prices,
borderColor:'#22c55e',
backgroundColor:'rgba(34,197,94,0.2)',
fill:true,
tension:0.4
}]
}

});

}

loadChart();

</script>

</body>

</html>
